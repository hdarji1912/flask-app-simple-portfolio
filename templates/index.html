<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardik Darji - Portfolio Card</title>
    <style>
        /* Base Reset & Background styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #2a1654, #080711 60%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            padding: 2rem;
        }

        /* Core Card Structure */
        .portfolio-container {
            width: 100%;
            max-width: 1000px;
            background: linear-gradient(145deg, rgba(20, 18, 43, 0.4), rgba(10, 9, 22, 0.7));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 3.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }

        /* Typography & Header section */
        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00f0ff 0%, #7000ff 70%, #d400ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.2rem;
        }

        .subtitle {
            display: inline-block;
            border: 1.5px solid #231d54;
            background: rgba(14, 12, 36, 0.6);
            padding: 0.6rem 1.8rem;
            border-radius: 999px;
            font-size: 1rem;
            color: #efefff;
            letter-spacing: 0.05em;
            margin-bottom: 3.5rem;
        }

        /* Skill Cards Grid System */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 3.5rem;
        }

        .skill-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border-radius: 20px;
            padding: 2.5rem 1.5rem 2rem 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            min-height: 280px;
            transition: transform 0.3s ease;
        }

        .skill-card:hover {
            transform: translateY(-5px);
        }

        /* Individual Card Accent Borders and Accent Bars */
        .skill-card.linux { border: 1px solid rgba(0, 140, 255, 0.25); }
        .skill-card.github { border: 1px solid rgba(140, 0, 255, 0.25); }
        .skill-card.shell { border: 1px solid rgba(0, 255, 140, 0.25); }
        .skill-card.python { border: 1px solid rgba(255, 200, 0, 0.25); }

        .accent-bar {
            width: 50px;
            height: 4px;
            border-radius: 999px;
            margin-top: 1.5rem;
        }

        .linux .accent-bar { background: #008cff; box-shadow: 0 0 12px #008cff; }
        .github .accent-bar { background: #8c00ff; box-shadow: 0 0 12px #8c00ff; }
        .shell .accent-bar { background: #00ff8c; box-shadow: 0 0 12px #00ff8c; }
        .python .accent-bar { background: #ffc800; box-shadow: 0 0 12px #ffc800; }

        /* Skill Content Items */
        .skill-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .skill-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .linux .skill-label { color: #008cff; }
        .github .skill-label { color: #a154ff; }
        .shell .skill-label { color: #00ff8c; }
        .python .skill-label { color: #ffc800; }

        .skill-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
        }

        /* SVG Icon styling over-rides if needed */
        .skill-icon svg {
            width: 64px;
            height: 64px;
        }

        /* Bottom Tags / Personality Traits Container */
        .traits-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .trait-tag {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(14, 12, 36, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 0.6rem 1.4rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .trait-tag.focused { color: #3b82f6; border-color: rgba(59, 130, 246, 0.2); }
        .trait-tag.problem-solver { color: #a855f7; border-color: rgba(168, 85, 247, 0.2); }
        .trait-tag.quick-learner { color: #22c55e; border-color: rgba(34, 197, 94, 0.2); }
        .trait-tag.goal-oriented { color: #eab308; border-color: rgba(234, 179, 8, 0.2); }

        .trait-tag svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Responsive Breakpoint adjustments */
        @media (max-width: 768px) {
            .portfolio-container { padding: 2rem 1.5rem; }
            h1 { font-size: 2.8rem; }
            .skills-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 480px) {
            .skills-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
